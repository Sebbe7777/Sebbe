<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Super Panda Bros</title>
  <style>
    body { 
      margin: 0; 
      background: #020617; 
      display: flex; 
      justify-content: center; 
      align-items: center; 
      height: 100vh; 
      color: white; 
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      overflow: hidden;
    }
    
    #game-wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }

    #game-container {
      position: relative;
      box-shadow: 0 20px 50px rgba(0,0,0,0.5);
      border-radius: 8px;
      overflow: hidden;
      border: 2px solid #334155;
    }

    canvas { 
      background: #0f172a;
      display: block;
    }

    /* AI Narrator Box */
    #ai-narrator {
      width: 800px;
      min-height: 60px;
      background: #1e293b;
      border: 2px solid #6366f1;
      border-radius: 8px;
      padding: 15px;
      box-sizing: border-box;
      display: flex;
      flex-direction: column;
      justify-content: center;
      position: relative;
      box-shadow: 0 4px 6px rgba(0,0,0,0.3);
      transition: all 0.3s ease;
    }

    #ai-narrator h3 {
      margin: 0 0 5px 0;
      font-size: 14px;
      color: #a5b4fc;
      text-transform: uppercase;
      letter-spacing: 1px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    #ai-text {
      margin: 0;
      font-size: 16px;
      color: #e2e8f0;
      font-style: italic;
      line-height: 1.4;
      min-height: 24px;
    }

    .loading-pulse {
      display: inline-block;
      width: 10px;
      height: 10px;
      background-color: #6366f1;
      border-radius: 50%;
      animation: pulse 1s infinite;
    }

    @keyframes pulse {
      0% { transform: scale(0.8); opacity: 0.5; }
      100% { transform: scale(1.2); opacity: 0; }
    }

    /* UI Overlay */
    #ui-layer {
      position: absolute;
      inset: 0;
      pointer-events: none;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      text-shadow: 2px 2px 0 #000;
      z-index: 10;
    }

    .hidden { display: none !important; }

    /* Screens */
    .screen {
      background: rgba(2, 6, 23, 0.95);
      padding: 40px;
      border-radius: 16px;
      border: 1px solid #334155;
      pointer-events: auto;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 15px;
      min-width: 300px;
    }

    h1 { font-size: 36px; margin: 0; color: #facc15; }
    h2 { font-size: 24px; margin: 0; color: #38bdf8; }
    p { font-size: 18px; margin: 5px 0; color: #cbd5e1; }

    input[type="text"] {
      padding: 12px;
      border-radius: 6px;
      border: 1px solid #475569;
      background: #1e293b;
      color: white;
      font-size: 18px;
      width: 100%;
      box-sizing: border-box;
      text-align: center;
    }
    
    .btn {
      background: #22c55e;
      border: none;
      padding: 12px 24px;
      color: white;
      font-size: 18px;
      font-weight: bold;
      border-radius: 6px;
      cursor: pointer;
      width: 100%;
      transition: transform 0.1s, background 0.2s;
    }
    .btn:hover { transform: scale(1.02); background: #16a34a; }
    .btn-share { background: #3b82f6; }
    .btn-share:hover { background: #2563eb; }

    #level-indicator {
      position: absolute;
      top: 20px;
      right: 20px;
      font-size: 24px;
      font-weight: bold;
      color: #fff;
      pointer-events: none;
      text-shadow: 2px 2px 0 #000;
    }
  </style>
</head>
<body>

  <div id="game-wrapper">
    <div id="game-container">
      <canvas id="game" width="800" height="400"></canvas>
      <div id="level-indicator">NIVÅ 1</div>
      
      <div id="ui-layer">
        
        <!-- START SCREEN -->
        <div id="start-screen" class="screen">
          <h1>🐼 SUPER PANDA BROS</h1>
          <p>Undvik spikar & drakar. Nå målet!</p>
          <button class="btn" id="start-btn">Starta Spelet</button>
          <p class="blink" style="margin-top: 15px;">...eller tryck SPACE</p>
        </div>

        <!-- GAME OVER SCREEN -->
        <div id="game-over-screen" class="screen hidden">
          <h1 style="color: #ef4444;">GAME OVER</h1>
          <p id="final-score-lose"></p>
          <button class="btn" onclick="resetGame()">Spela Igen</button>
          <button class="btn btn-share" onclick="shareGame()">🔗 Dela Spel</button>
        </div>

        <!-- WIN SCREEN -->
        <div id="win-screen" class="screen hidden">
          <h1 style="color: #22c55e;">GRATTIS!</h1>
          <p>Du klarade alla 10 nivåer! 🐼👑</p>
          <p id="final-score-win"></p>
          <button class="btn" onclick="resetGame()">Spela Igen</button>
          <button class="btn btn-share" onclick="shareGame()">🔗 Dela Vinst</button>
        </div>

        <!-- LEVEL TRANSITION -->
        <div id="level-screen" class="hidden" style="background: rgba(0,0,0,0.7); padding: 20px; border-radius: 10px;">
          <h1 id="level-title" style="color: #38bdf8;">NIVÅ KLAR!</h1>
        </div>
      </div>
    </div>

    <!-- Gemini AI Box -->
    <div id="ai-narrator">
      <h3>✨ Gemini Narrator</h3>
      <p id="ai-text">Välkommen! Tryck på start för att börja ditt äventyr.</p>
    </div>
  </div>

<script>
// Starta spel
document.getElementById('start-btn').addEventListener('click', () => {
  document.getElementById('start-screen').classList.add('hidden');
  resetGame();
});

// --- DELA FUNKTION ---
window.shareGame = function() {
  const url = window.location.href;
  navigator.clipboard.writeText(url).then(() => {
    alert("Länk kopierad! Skicka den till en vän.");
  }).catch(() => {
    prompt("Kopiera denna länk:", url);
  });
}

// --- GEMINI API SETUP ---
const apiKey = ""; 
const aiText = document.getElementById('ai-text');

async function generateNarratorText(prompt) {
  aiText.innerHTML = 'Thinking <span class="loading-pulse"></span>';
  
  try {
    const response = await fetch(
      `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`,
      {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          contents: [{ parts: [{ text: prompt }] }],
          systemInstruction: {
            parts: [{ text: "You are the narrator of a fast-paced platformer game called Super Panda Bros. You are witty, slightly sarcastic, but encouraging. Keep responses very short, under 15 words." }]
          }
        })
      }
    );

    if (!response.ok) throw new Error('API Error');
    const data = await response.json();
    const text = data.candidates?.[0]?.content?.parts?.[0]?.text || "Interesting...";
    typeWriter(text);
  } catch (error) {
    // Tyst vid fel
    aiText.textContent = "...";
  }
}

let typeTimeout;
function typeWriter(text) {
  clearTimeout(typeTimeout);
  aiText.textContent = "";
  let i = 0;
  function type() {
    if (i < text.length) {
      aiText.textContent += text.charAt(i);
      i++;
      typeTimeout = setTimeout(type, 30);
    }
  }
  type();
}

// --- SPELKOD ---
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

// UI Elements
const uiStart = document.getElementById('start-screen');
const uiGameOver = document.getElementById('game-over-screen');
const uiWin = document.getElementById('win-screen');
const uiLevel = document.getElementById('level-screen');
const scoreLose = document.getElementById('final-score-lose');
const scoreWin = document.getElementById('final-score-win');
const levelIndicator = document.getElementById('level-indicator');

// Inställningar
const gravity = 0.6;
let worldWidth = 3000; 
let cameraX = 0;
let gameState = 'MENU'; // MENU, PLAYING, GAMEOVER, WIN, LEVEL_TRANSITION
let keys = {};
let currentLevel = 1;
const maxLevels = 10;

// Teman
const themes = [
  { type: 'forest',   color: '#22c55e', bg: '#86efac', platform: '#166534', ground: '#14532d', name: 'Skogen' },
  { type: 'desert',   color: '#facc15', bg: '#fef08a', platform: '#d97706', ground: '#92400e', name: 'Öknen' },
  { type: 'ice',      color: '#7dd3fc', bg: '#e0f2fe', platform: '#0ea5e9', ground: '#0284c7', name: 'Islandet' },
  { type: 'lava',     color: '#ef4444', bg: '#fee2e2', platform: '#7f1d1d', ground: '#450a0a', name: 'Vulkanen' },
  { type: 'city',     color: '#64748b', bg: '#cbd5e1', platform: '#334155', ground: '#1e293b', name: 'Staden' },
  { type: 'jungle',   color: '#15803d', bg: '#dcfce7', platform: '#14532d', ground: '#064e3b', name: 'Djungeln' },
  { type: 'mountain', color: '#a8a29e', bg: '#e7e5e4', platform: '#57534e', ground: '#44403c', name: 'Berget' },
  { type: 'sky',      color: '#38bdf8', bg: '#bae6fd', platform: '#f0f9ff', ground: '#7dd3fc', name: 'Himlen' },
  { type: 'space',    color: '#020617', bg: '#0f172a', platform: '#64748b', ground: '#1e293b', name: 'Rymden' },
  { type: 'boss',     color: '#000000', bg: '#262626', platform: '#dc2626', ground: '#7f1d1d', name: 'Bossen' }
];

// Objekt
let panda = { x: 50, y: 0, w: 40, h: 40, vx: 0, vy: 0, onGround: false };
const groundY = 360;

let platforms = [];
let spikes = [];
let coins = [];
let dragon = {};
let fires = [];
let score = 0;
let goal = { x: 0, y: 0, w: 0, h: 0 };
let decoElements = [];

function loadLevel(lvl) {
  fires = [];
  panda.vx = 0;
  panda.vy = 0;
  panda.x = 50;
  panda.y = 0;
  cameraX = 0;
  
  const theme = themes[lvl - 1];
  levelIndicator.innerText = `${lvl}. ${theme.name}`;
  levelIndicator.style.color = theme.type === 'space' || theme.type === 'boss' ? '#fff' : '#1e293b';

  generateNarratorText(`Intro for Level ${lvl}: ${theme.name}. Give a short, witty encouragement.`);

  worldWidth = 2600 + lvl * 400; 

  platforms = [];
  spikes = [];
  coins = [];
  decoElements = [];

  // Dekorationer
  if (theme.type === 'sky' || theme.type === 'ice' || theme.type === 'forest' || theme.type === 'mountain') {
    for(let i=0; i<20; i++) {
      decoElements.push({ x: Math.random() * worldWidth, y: Math.random() * 200, w: 60 + Math.random()*40, h: 30, type: 'cloud' });
    }
  } 
  if (theme.type === 'space' || theme.type === 'boss') {
    for(let i=0; i<100; i++) {
      decoElements.push({ x: Math.random() * worldWidth, y: Math.random() * 400, size: Math.random() * 2, type: 'star' });
    }
  }

  // Plattformar
  const platformCount = 5 + lvl;
  for(let i=0; i<platformCount; i++){
    let py = 320 - (i % 3) * 40 - (lvl * 2);
    if (py < 150) py = 200 + (i%2)*40;
    
    platforms.push({
      x: 300 + i * 250,
      y: py,
      w: 120,
      h: 20
    });
  }

  // Spikar
  const spikeCount = 2 + Math.floor(lvl * 1.5);
  for(let i=0; i<spikeCount; i++){
    let sx = 400 + i * (worldWidth / (spikeCount + 1)) + Math.random() * 100;
    spikes.push({ x: sx, y: 340, w: 40, h: 20 });
  }

  // Mynt
  const coinCount = 5 + lvl;
  for(let i=0; i<coinCount; i++){
    coins.push({ 
      x: 350 + i * 300, 
      y: 200 + Math.sin(i)*50, 
      w: 20, h: 20, 
      collected: false 
    });
  }

  dragon = { x: worldWidth - 600, y: 200, w: 80, h: 80, fireTimer: 0 };
  goal = { x: worldWidth - 100, y: 280, w: 40, h: 80 };
}

window.resetGame = function() {
  score = 0;
  currentLevel = 1;
  loadLevel(currentLevel);
  setGameState('PLAYING');
}

function initGame() {
  score = 0;
  currentLevel = 1;
  loadLevel(currentLevel);
}

function rectsCollide(a, b) {
  return a.x < b.x + b.w && 
         a.x + a.w > b.x && 
         a.y < b.y + b.h && 
         a.y + a.h > b.y;
}

function setGameState(state) {
  gameState = state;
  uiStart.classList.add('hidden');
  uiGameOver.classList.add('hidden');
  uiWin.classList.add('hidden');
  uiLevel.classList.add('hidden');

  if (state === 'MENU') {
    uiStart.classList.remove('hidden');
  } else if (state === 'GAMEOVER') {
    uiGameOver.classList.remove('hidden');
    scoreLose.innerText = `Poäng: ${score}`;
  } else if (state === 'WIN') {
    uiWin.classList.remove('hidden');
    scoreWin.innerText = `Poäng: ${score}`;
    generateNarratorText("Congratulate the player for beating the entire game.");
  } else if (state === 'LEVEL_TRANSITION') {
    uiLevel.classList.remove('hidden');
    setTimeout(() => {
      setGameState('PLAYING');
    }, 2000);
  }
}

function update() {
  if (gameState !== 'PLAYING') return;

  if (keys['ArrowRight']) panda.vx = 5;
  else if (keys['ArrowLeft']) panda.vx = -5;
  else panda.vx = 0;

  if (keys[' '] && panda.onGround) {
    panda.vy = -13;
    panda.onGround = false;
  }
  
  if (keys['ArrowDown']) panda.vy += 0.8;

  panda.vy += gravity;
  panda.x += panda.vx;
  panda.y += panda.vy;

  if (panda.x < 0) panda.x = 0;

  // Mark
  panda.onGround = false; 
  if (panda.y + panda.h >= groundY) {
    panda.y = groundY - panda.h;
    panda.vy = 0;
    panda.onGround = true;
  }

  // Plattformar
  for (const p of platforms) {
    const dropThrough = keys['ArrowDown'];
    if (!dropThrough && rectsCollide(panda, p) && panda.vy > 0 && (panda.y + panda.h - panda.vy) <= p.y + 15) {
      panda.y = p.y - panda.h;
      panda.vy = 0;
      panda.onGround = true;
    }
  }

  // Spikar
  for (const s of spikes) {
    const hitbox = { x: s.x + 5, y: s.y + 10, w: s.w - 10, h: s.h - 10 };
    if (rectsCollide(panda, hitbox)) {
      generateNarratorText("Roast the player for dying on spikes.");
      setGameState('GAMEOVER');
    }
  }

  // Mynt
  for (const c of coins) {
    if (!c.collected && rectsCollide(panda, c)) {
      c.collected = true;
      score += 10;
    }
  }

  // Kamera
  let targetCamX = panda.x - 200;
  if (targetCamX < 0) targetCamX = 0;
  if (targetCamX > worldWidth - canvas.width) targetCamX = worldWidth - canvas.width;
  cameraX += (targetCamX - cameraX) * 0.1;

  // Drake
  dragon.y = 200 + Math.sin(Date.now() / 400) * 40;

  if (Math.abs(panda.x - dragon.x) < 700) {
    dragon.fireTimer++;
    let fireBase = currentLevel === 10 ? 20 : 100;
    let fireThreshold = Math.max(25, fireBase - (currentLevel * 4));
    
    if (dragon.fireTimer > fireThreshold) { 
      const dx = (panda.x + panda.w/2) - (dragon.x + dragon.w/2);
      const dy = (panda.y + panda.h/2) - (dragon.y + dragon.h/2);
      const len = Math.hypot(dx, dy);
      
      fires.push({
        x: dragon.x + dragon.w/2, 
        y: dragon.y + dragon.h/2, 
        w: 20, h: 20, 
        vx: (dx/len) * (5 + currentLevel * 0.3), 
        vy: (dy/len) * (5 + currentLevel * 0.3)
      });
      dragon.fireTimer = 0;
    }
  }

  for (let i = fires.length - 1; i >= 0; i--) {
    let f = fires[i];
    f.x += f.vx;
    f.y += f.vy;

    if (f.x < cameraX - 100 || f.x > cameraX + canvas.width + 100) {
      fires.splice(i, 1);
      continue;
    }

    if (rectsCollide(panda, {x: f.x+4, y: f.y+4, w: f.w-8, h: f.h-8})) {
      generateNarratorText("Roast the player for getting burned by dragon fire.");
      setGameState('GAMEOVER');
    }
  }

  // Mål
  if (rectsCollide(panda, goal)) {
    if (currentLevel < maxLevels) {
      score += 200; 
      currentLevel++;
      loadLevel(currentLevel);
      setGameState('LEVEL_TRANSITION');
    } else {
      score += 1000; 
      setGameState('WIN');
    }
  }

  if (panda.y > canvas.height + 100) {
    generateNarratorText("Mock the player for falling into the abyss.");
    setGameState('GAMEOVER');
  }
}

function draw() {
  const theme = themes[currentLevel - 1];

  ctx.clearRect(0, 0, canvas.width, canvas.height);
  
  ctx.fillStyle = theme.bg;
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  ctx.save();
  ctx.translate(-Math.floor(cameraX), 0);

  for (const d of decoElements) {
    if (d.type === 'cloud') {
      ctx.fillStyle = 'rgba(255,255,255,0.6)';
      ctx.beginPath();
      ctx.roundRect(d.x, d.y, d.w, d.h, 15);
      ctx.fill();
    } else if (d.type === 'star') {
      ctx.fillStyle = '#fff';
      ctx.globalAlpha = Math.random() * 0.5 + 0.5;
      ctx.fillRect(d.x, d.y, d.size, d.size);
      ctx.globalAlpha = 1.0;
    }
  }

  // Mark
  ctx.fillStyle = theme.ground;
  ctx.fillRect(0, groundY, worldWidth, 40);
  ctx.fillStyle = theme.platform; 
  ctx.fillRect(0, groundY, worldWidth, 5);

  // Plattformar
  for (const p of platforms) {
    ctx.fillStyle = theme.ground;
    ctx.fillRect(p.x, p.y, p.w, p.h);
    ctx.fillStyle = theme.platform;
    ctx.fillRect(p.x, p.y, p.w, 5);
  }

  // Spikar
  ctx.fillStyle = currentLevel === 4 ? '#7f1d1d' : '#94a3b8';
  for (const s of spikes) {
    ctx.beginPath();
    ctx.moveTo(s.x, s.y + s.h);
    ctx.lineTo(s.x + s.w / 2, s.y);
    ctx.lineTo(s.x + s.w, s.y + s.h);
    ctx.fill();
  }

  // Mynt
  ctx.font = "20px Arial";
  ctx.textAlign = "center";
  ctx.textBaseline = "middle";
  for (const c of coins) {
    if (!c.collected) {
      let bounce = Math.sin(Date.now() / 200) * 3;
      ctx.fillText('🪙', c.x + c.w/2, c.y + c.h/2 + bounce);
    }
  }

  // Mål
  ctx.fillStyle = '#fde047';
  ctx.fillRect(goal.x, goal.y, 5, 80);
  ctx.fillStyle = '#ef4444'; 
  ctx.beginPath();
  ctx.moveTo(goal.x + 5, goal.y);
  ctx.lineTo(goal.x + 40, goal.y + 20);
  ctx.lineTo(goal.x + 5, goal.y + 40);
  ctx.fill();

  // Drake
  ctx.font = "60px Arial";
  ctx.save();
  ctx.translate(dragon.x + dragon.w/2, dragon.y + dragon.h/2);
  if (panda.x > dragon.x) ctx.scale(-1, 1);
  ctx.fillText('🐲', 0, 0);
  ctx.restore();

  // Eld
  ctx.font = "20px Arial";
  for (const f of fires) {
    ctx.fillText('🔥', f.x + f.w/2, f.y + f.h/2);
  }

  // Panda
  ctx.font = "40px Arial";
  ctx.save();
  ctx.translate(panda.x + panda.w/2, panda.y + panda.h/2);
  if (panda.vx < 0) ctx.scale(-1, 1);
  ctx.fillText('🐼', 0, 0);
  ctx.restore();

  ctx.restore();

  // HUD
  ctx.fillStyle = theme.type === 'space' || theme.type === 'boss' ? '#fff' : '#000';
  ctx.font = 'bold 24px sans-serif';
  ctx.textAlign = 'left';
  ctx.fillText('POÄNG: ' + score, 20, 35);
}

function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}

window.addEventListener('keydown', e => {
  if(['ArrowUp','ArrowDown','ArrowLeft','ArrowRight',' '].indexOf(e.key) > -1) {
    e.preventDefault();
  }
  keys[e.key] = true;

  if (e.key === ' ' || e.key === 'Enter') {
    if (gameState === 'MENU' || gameState === 'GAMEOVER' || gameState === 'WIN') {
      if (gameState === 'MENU') {
        document.getElementById('start-screen').classList.add('hidden');
      }
      resetGame();
    }
  }
});

window.addEventListener('keyup', e => {
  keys[e.key] = false;
});

// Init
setGameState('MENU'); // Börja i menyn med namn
loop();
</script>
</body>
</html>
